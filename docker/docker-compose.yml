services:
  mysql:
    image: mysql:8.0
    container_name: agritrace-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "1154228715"
      MYSQL_DATABASE: traceability
    ports:
      - "3306:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1154228715"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agritrace-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/traceability?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1154228715
    ports:
      - "8080:8080"

  admin-web:
    build:
      context: ../admin-web
      dockerfile: Dockerfile
    container_name: agritrace-admin-web
    depends_on:
      - backend
    ports:
      - "5174:80"

  trace-web:
    build:
      context: ../trace-web
      dockerfile: Dockerfile
    container_name: agritrace-trace-web
    depends_on:
      - backend
    ports:
      - "5173:80"
