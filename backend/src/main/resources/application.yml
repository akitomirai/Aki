server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/traceability_cs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: "1154228715"
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: agritrace-secret-key-2026-for-jwt-signing-secure-very-long
  expire: 604800000

app:
  user:
    default-password: "ChangeMe!2026"

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 01-auth
      packages-to-scan: edu.jxust.agritrace.controller.auth
    - group: 02-public
      packages-to-scan: edu.jxust.agritrace.controller.publicapi
    - group: 03-enterprise
      packages-to-scan: edu.jxust.agritrace.controller.enterprise
    - group: 04-regulator
      packages-to-scan: edu.jxust.agritrace.controller.regulator
    - group: 05-platform
      packages-to-scan: edu.jxust.agritrace.controller.platform

knife4j:
  enable: true
  setting:
    language: zh_cn
