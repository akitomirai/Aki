spring:
  application:
    name: traceability-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/traceability_cs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  trace:
    public-base-url: ${PUBLIC_TRACE_BASE_URL:http://127.0.0.1:5173}
    backend-base-url: ${BACKEND_BASE_URL:http://127.0.0.1:8080}
    qr-storage-dir: ${QR_STORAGE_DIR:${user.dir}/storage/qr}
    attachment-storage-dir: ${ATTACHMENT_STORAGE_DIR:${user.dir}/storage/attachments}
    trace-image-max-size: ${TRACE_IMAGE_MAX_SIZE:5MB}
    trace-image-allowed-extensions: ${TRACE_IMAGE_ALLOWED_EXTENSIONS:.png,.jpg,.jpeg,.webp,.gif}
    trace-image-allowed-content-types: ${TRACE_IMAGE_ALLOWED_CONTENT_TYPES:image/png,image/jpeg,image/webp,image/gif}
    quality-attachment-max-size: ${QUALITY_ATTACHMENT_MAX_SIZE:10MB}
    quality-attachment-allowed-extensions: ${QUALITY_ATTACHMENT_ALLOWED_EXTENSIONS:.pdf,.png,.jpg,.jpeg,.webp}
    quality-attachment-allowed-content-types: ${QUALITY_ATTACHMENT_ALLOWED_CONTENT_TYPES:application/pdf,image/png,image/jpeg,image/webp}
    attachment-orphan-cleanup-hours: ${ATTACHMENT_ORPHAN_CLEANUP_HOURS:24}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
