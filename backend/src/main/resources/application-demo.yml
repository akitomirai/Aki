spring:
  datasource:
    url: jdbc:h2:mem:agritrace_demo;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-demo.sql
      data-locations: classpath:data-demo.sql

management:
  health:
    redis:
      enabled: false

app:
  trace:
    public-base-url: ${PUBLIC_TRACE_BASE_URL:http://127.0.0.1:5173}
    backend-base-url: ${BACKEND_BASE_URL:http://127.0.0.1:8080}
    qr-storage-dir: ${QR_STORAGE_DIR:${java.io.tmpdir}/agritrace-demo/qr}
    attachment-storage-dir: ${ATTACHMENT_STORAGE_DIR:${java.io.tmpdir}/agritrace-demo/attachments}
    attachment-orphan-cleanup-hours: 4
