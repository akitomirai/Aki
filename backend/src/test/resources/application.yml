spring:
  datasource:
    url: jdbc:h2:mem:agritrace;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

app:
  trace:
    public-base-url: http://127.0.0.1:5173
    backend-base-url: http://127.0.0.1:8080
    qr-storage-dir: ${java.io.tmpdir}/agritrace-test-qr
